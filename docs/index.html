<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AyurAssist — AI Clinical Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

  <header class="header">
    <div class="header-badge">🌿 WHO ITA Standards · SNOMED CT Mapped</div>
    <h1>Ayur<span>Assist</span></h1>
    <p class="header-sub">AI-Powered Ayurvedic Clinical Decision Support</p>
  </header>

  <section class="search-section">
    <div class="examples" id="examples">
        <button class="example-btn" data-value="severe joint pain and stiffness">Arthritis</button>
        <button class="example-btn" data-value="difficulty breathing wheezing">Asthma</button>
        <button class="example-btn" data-value="yellowish skin and eyes nausea">Jaundice</button>
    </div>
    
    <div class="search-wrapper">
        <input class="search-input" id="symptomInput" type="text" placeholder="Describe symptoms (e.g., severe headache, acidity, skin rash)...">
        <button class="search-btn" id="analyzeBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Analyze
        </button>
    </div>
    
    <div id="loading" class="hidden loading-state">
        <div class="spinner"></div>
        <p>AI is analyzing clinical entities...</p>
    </div>
    <div id="error" class="hidden error-msg"></div>
  </section>

  <div id="nerStrip" class="hidden ner-strip"></div>
  
  <div id="matchBanner" class="hidden match-banner">
    <div class="match-left">
        <h3>Ayurvedic Match Found</h3>
        <p id="matchDetails">Detected: ...</p>
    </div>
    <div id="matchPercent" class="match-percent">100%</div>
  </div>

  <div id="diseaseHeader" class="hidden section-card disease-header">
    <span id="itaCode" class="ita-badge">ITA</span>
    <h2 id="diseaseName"></h2>
    <p id="sanskritName" class="sanskrit-title"></p>
    
    <div id="doshaLine" class="dosha-line"></div>
    
    <div class="snomed-row">
        <strong>SNOMED CT:</strong> 
        <span id="snomedCode" class="snomed-code"></span>
        <span id="snomedName" style="margin-left:5px; color:#666;"></span> 
    </div>
  </div>

  <div id="results"></div>

  <div id="disclaimerFooter" class="hidden disclaimer">
    ⚠️ <strong>Disclaimer:</strong> Educational use only. Consult a qualified practitioner.
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
