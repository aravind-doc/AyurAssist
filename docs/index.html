<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AyurAssist — AI Clinical Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

  <header class="header">
    <div class="header-badge">🌿 WHO ITA Standards · SNOMED CT Mapped</div>
    <h1>Ayur<span>Assist</span></h1>
    <p style="color:#777; margin-top:8px;">AI-Powered Ayurvedic Clinical Decision Support</p>
  </header>

  <section class="search-section">
    <div class="examples" id="examples" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:15px;">
        <button class="example-btn" style="background:#e8f0de; border:none; padding:5px 10px; border-radius:15px; cursor:pointer;" data-value="severe joint pain and stiffness">Arthritis</button>
        <button class="example-btn" style="background:#e8f0de; border:none; padding:5px 10px; border-radius:15px; cursor:pointer;" data-value="difficulty breathing wheezing">Asthma</button>
    </div>
    
    <input class="search-input" id="symptomInput" type="text" placeholder="Describe symptoms (e.g., migraine, acidity, skin rash)...">
    
    <button class="search-btn" id="analyzeBtn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Analyze Symptoms
    </button>
    
    <div id="loading" class="hidden" style="text-align:center; margin-top:15px; color:#666;">
        🔄 AI is analyzing... (This may take 30s)
    </div>
    <div id="error" class="hidden" style="color:red; margin-top:10px; text-align:center;"></div>
  </section>

  <div id="nerStrip" class="hidden" style="margin-bottom:20px;"></div>
  
  <div id="matchBanner" class="hidden" style="background:#2D5016; color:white; padding:15px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
    <div>
        <h3 style="margin:0; font-size:16px;">Ayurvedic Match Found</h3>
        <p id="matchDetails" style="margin:5px 0 0 0; font-size:13px; opacity:0.9;"></p>
    </div>
    <div id="matchPercent" style="font-family:'Fraunces'; font-size:24px; color:#A4C639;">100%</div>
  </div>

  <div id="diseaseHeader" class="hidden section-card" style="text-align:center;">
    <span id="itaCode" style="background:#FFF3D0; color:#D4A017; font-size:11px; padding:4px 8px; border-radius:10px; font-weight:700;">ITA</span>
    <h2 id="diseaseName" style="margin:10px 0 5px 0; color:#2D5016;"></h2>
    <p id="sanskritName" style="font-family:'Fraunces'; font-style:italic; color:#8B4513; margin-bottom:15px;"></p>
    <div id="doshaLine"></div>
    <div id="snomedCode" style="font-family:monospace; margin-top:10px; color:#666; font-size:12px;"></div>
  </div>

  <div id="results"></div>

  <div id="disclaimerFooter" class="hidden" style="margin-top:30px; padding:20px; background:#EDE8DF; text-align:center; font-size:13px; color:#666; border-radius:12px;">
    ⚠️ <strong>Disclaimer:</strong> Educational use only. Consult a practitioner.
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
